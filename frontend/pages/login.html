<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Code Burger</title>
    <link rel="shortcut icon" href="/frontend/logoicone/logo_codeburger.png" type="image/x-icon">
    <link rel="stylesheet" href="/frontend/css/login_cadastro.css">
</head>

<body>

    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="/frontend/logoicone/logo_codeburger.png" alt="Code Burger">
                    <span class="logo-text">Code <span class="logo-dot">•</span> Burger</span>
                </a>
            </div>
            <nav>
                <ul class="leftside">
                    <li><a href="/frontend/pages/index.html">Início</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <div class="page-container">
        <div class="form-wrapper">
            <div class="header-section">
                <img src="/frontend/logoicone/logo_codeburger.png" alt="Code Burger" class="logo">
                <h1 class="main-title">Code Burger</h1>
                <p class="subtitle">Entre na sua conta para continuar</p>
            </div>

            <div class="form-card">
                <div class="card-header">
                    <h2 class="card-title">Login</h2>
                    <p class="card-description">Digite suas credenciais para acessar</p>
                </div>

                <div class="card-content">
                    <form id="loginForm" class="form">
                        <div class="input-group">
                            <label for="email" class="label">Email</label>
                            <input type="email" id="email" class="input" placeholder="seu@email.com" required>
                        </div>

                        <div class="input-group">
                            <label for="password" class="label">Senha</label>
                            <input type="password" id="password" class="input" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-gradient btn-full" id="loginBtn">
                            Entrar
                        </button>
                    </form>

                    <div class="footer-links">
                        <p class="link-text">
                            Não tem uma conta?
                            <a href="/frontend/pages/cadastro.html" class="link">Cadastre-se</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <h3 id="toastTitle" class="toast-title"></h3>
            <p id="toastDescription" class="toast-description"></p>
        </div>
    </div>

    <script src="/frontend/js/login.js"></script>
    <script src="/frontend/js/global.js"></script>
</body>

</html>
